<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>MPL Arm Jump Test</title></head>
<body>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
import { MMDAnimationHelper } from 'three/addons/animation/MMDAnimationHelper.js';
import { initSync as mplInitSync, WasmMPLCompiler } from './libs/mmd_mpl.js';

// ====== 全局状态 ======
window.__test = { status: 'init', bones: {}, jumps: [], mixer: null, mesh: null, idleClip: null };

// ====== 加载 MPL 编译器 ======
const wasmResp = await fetch('./libs/mmd_mpl_bg.wasm');
const wasmBytes = await wasmResp.arrayBuffer();
mplInitSync({ module: wasmBytes });
const mplCompiler = new WasmMPLCompiler();
window.__test.status = 'compiler ready';

// ====== 加载模型和 VMD ======
const loader = new MMDLoader();
const helper = new MMDAnimationHelper();

function loadModel(url) {
    return new Promise((resolve, reject) => loader.load(url, resolve, undefined, reject));
}
function loadVmd(url) {
    return new Promise((resolve, reject) => loader.loadAnimation(url, null, resolve, undefined, reject));
}

window.__test.status = 'loading model...';
const mesh = await loadModel('./models/miku_v2.pmd');
window.__test.mesh = mesh;
window.__test.status = 'model loaded, loading idle...';

const idleVmd = await new Promise((resolve, reject) => loader.loadAnimation('./vmd/idle.vmd', mesh, resolve, undefined, reject));
window.__test.idleClip = idleVmd;
window.__test.status = 'idle loaded, setting up...';

// 设置 helper（模拟 index.html 的行为）
helper.add(mesh, {
    animation: idleVmd,
    physics: false
});

const mixer = helper.objects.get(mesh).mixer;
window.__test.mixer = mixer;

// 记录 idle action
const idleAct = mixer.clipAction(idleVmd);
idleAct.setEffectiveWeight(1);
idleAct.play();

window.__test.status = 'ready';

// ====== 骨骼监控函数 ======
const ARM_BONES = ['右腕', '左腕', '右肩', '左肩', '右ひじ', '左ひじ', '右手首', '左手首'];
const ALL_TARGETS = [...ARM_BONES, '頭', '首'];

function getBoneSnapshot() {
    const snap = {};
    for (const name of ALL_TARGETS) {
        const bone = mesh.skeleton.bones.find(b => b.name === name);
        if (bone) {
            const q = bone.quaternion;
            snap[name] = [+q.x.toFixed(6), +q.y.toFixed(6), +q.z.toFixed(6), +q.w.toFixed(6)];
        }
    }
    return snap;
}

// ====== Hook helper.update 监控骨骼变化 ======
const origUpdate = helper.update.bind(helper);
let frameCount = 0;
let monitorActive = true;

helper.update = function(delta) {
    const before = monitorActive ? getBoneSnapshot() : null;
    origUpdate(delta);
    const after = monitorActive ? getBoneSnapshot() : null;
    
    if (before && after) {
        // 检测手臂骨骼跳变
        for (const bone of ARM_BONES) {
            if (before[bone] && after[bone]) {
                const diff = before[bone].reduce((s, v, i) => s + Math.abs(v - after[bone][i]), 0);
                if (diff > 0.02) {
                    window.__test.jumps.push({
                        frame: frameCount,
                        bone,
                        diff: +diff.toFixed(5),
                        before: before[bone],
                        after: after[bone]
                    });
                }
            }
        }
        
        // 定期更新 bones 快照
        if (frameCount % 10 === 0) {
            window.__test.bones = after;
        }
    }
    frameCount++;
};

// ====== MPL 执行函数 ======
window.__test.executeMPL = async function(mplCode) {
    window.__test.jumps = [];
    
    const normalized = mplCode
        .replace(/\{/g, ' {\n').replace(/\}/g, '\n}\n')
        .replace(/;/g, ';\n').replace(/\n\s*\n/g, '\n').trim();
    
    const vmdBytes = mplCompiler.compile(normalized);
    const blob = new Blob([vmdBytes], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    
    return new Promise((resolve, reject) => {
        loader.loadAnimation(url, mesh, (animation) => {
            URL.revokeObjectURL(url);
            
            // keepIdle 模式：过滤轨道
            const involvedBones = new Set(
                (normalized.match(/^(\s*)(\w+)\s+(bend|turn|sway|move|reset)/gm) || [])
                    .map(line => line.trim().split(/\s+/)[0])
            );
            const involvedBonesJP = new Set(involvedBones);
            for (const bone of involvedBones) {
                try { const jp = mplCompiler.get_bone_japanese_name(bone); if (jp) involvedBonesJP.add(jp); } catch(e) {}
            }
            
            const filteredTracks = animation.tracks.filter(track => {
                const boneName = (track.name.match(/bones\[(.+?)\]/)||[])[1]||'';
                return involvedBonesJP.has(boneName);
            });
            
            console.log(`[TEST] MMDLoader tracks: ${animation.tracks.length}`);
            console.log(`[TEST] Target bones: ${[...involvedBonesJP].join(',')}`);
            console.log(`[TEST] Filtered tracks: ${filteredTracks.length}`);
            console.log(`[TEST] Track names: ${filteredTracks.map(t => t.name).join(', ')}`);
            
            const clip = new THREE.AnimationClip('agent', animation.duration, filteredTracks);
            clip.tracks.forEach(t => t.setInterpolation(THREE.InterpolateLinear));
            
            // 获取执行前快照
            const beforeSnap = getBoneSnapshot();
            
            // 播放
            const act = mixer.clipAction(clip);
            act.setEffectiveWeight(1);
            act.reset();
            act.play();
            
            console.log(`[TEST] Playing, duration: ${animation.duration}s`);
            
            // 等待动画结束
            setTimeout(() => {
                const afterSnap = getBoneSnapshot();
                
                // 比较
                const result = { before: beforeSnap, after: afterSnap, diffs: {} };
                for (const bone of ALL_TARGETS) {
                    if (beforeSnap[bone] && afterSnap[bone]) {
                        const d = beforeSnap[bone].reduce((s, v, i) => s + Math.abs(v - afterSnap[bone][i]), 0);
                        result.diffs[bone] = +d.toFixed(5);
                    }
                }
                
                console.log(`[TEST] Jumps detected: ${window.__test.jumps.length}`);
                resolve(result);
            }, (animation.duration + 0.5) * 1000);
            
        }, undefined, reject);
    });
};

// ====== 自动化测试 ======
window.__test.runFullTest = async function() {
    console.log('=== Starting full arm jump test ===');
    
    // 等几帧让 idle 稳定
    await new Promise(r => setTimeout(r, 2000));
    
    // 测试 keepIdle=ON
    console.log('[TEST] keepIdle=ON mode:');
    const result = await window.__test.executeMPL(
        '@pose nod { head bend forward 30; neck bend forward 10; } @animation nod_anim { 0.2: nod; } main { nod_anim; }'
    );
    
    console.log('[TEST] Results:');
    console.log('  Bone diffs after MPL execution:');
    for (const [bone, diff] of Object.entries(result.diffs)) {
        const isArm = ARM_BONES.includes(bone);
        const marker = isArm ? (diff > 0.01 ? '🔴' : '🟢') : '  ';
        console.log(`    ${marker} ${bone}: ${diff}`);
    }
    
    console.log(`[TEST] Frame-level jumps: ${window.__test.jumps.length}`);
    if (window.__test.jumps.length > 0) {
        console.log('[TEST] Jump details:');
        for (const j of window.__test.jumps.slice(0, 5)) {
            console.log(`    Frame ${j.frame}: ${j.bone} diff=${j.diff}`);
            console.log(`      Before: [${j.before.join(',')}]`);
            console.log(`      After:  [${j.after.join(',')}]`);
        }
    }
    
    // Mixier action 状态
    const actions = [];
    mixer._actions.forEach(a => {
        actions.push({
            name: a._clip?.name,
            weight: a.getEffectiveWeight(),
            running: a.isRunning(),
            tracks: a._clip?.tracks?.length,
            trackBones: a._clip?.tracks?.map(t => (t.name.match(/bones\[(.+?)\]/)||[])[1]).join(',')
        });
    });
    console.log('[TEST] Mixer actions:');
    for (const a of actions) {
        console.log(`    ${a.name}: weight=${a.weight} running=${a.running} tracks=${a.tracks} bones=${a.trackBones}`);
    }
    
    window.__test.status = 'test complete';
    return { jumps: window.__test.jumps.length, result, actions };
};

console.log('[TEST] Setup complete. Call window.__test.runFullTest() to start.');
document.title = 'Ready - MPL Arm Jump Test';
// Auto-run disabled — caller triggers manually
</script>
<body>
<p>Testing MPL arm jump with keepIdle=ON...</p>
</body>
</html>
